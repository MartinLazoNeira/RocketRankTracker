<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rocket League Pro Settings & Events</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-start: #004DE5;
            --bg-gradient-end: #FF5E00;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #333;
            --text-secondary: #666;
            --border-color: #e0e0e0;
            --sidebar-bg: rgba(0, 0, 0, 0.3);
            --sidebar-hover: rgba(255, 94, 0, 0.3);
            --event-card-bg: #f8f9fa;
            --event-border: #FF5E00;
            --modal-bg: white;
            --modal-text: #333;
            --clock-bg: rgba(0,0,0,0.5);
        }

        body.dark {
            --bg-gradient-start: #001a4d;
            --bg-gradient-end: #4a1c00;
            --card-bg: rgba(30, 30, 40, 0.95);
            --text-primary: #e0e0e0;
            --text-secondary: #aaa;
            --border-color: #444;
            --sidebar-bg: rgba(0, 0, 0, 0.5);
            --event-card-bg: #2a2a3a;
            --modal-bg: #2a2a3a;
            --modal-text: #e0e0e0;
            --clock-bg: rgba(0,0,0,0.7);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        .app-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            border-right: 2px solid rgba(255, 94, 0, 0.3);
            transition: all 0.3s;
            z-index: 10;
        }

        .sidebar-header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #FF5E00;
            margin-bottom: 20px;
        }

        .sidebar-header h2 {
            color: white;
            font-size: 1.3em;
        }

        .sidebar-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8em;
            margin-top: 5px;
        }

        .real-clock {
            background: var(--clock-bg);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }

        .real-clock .date {
            color: white;
            font-size: 0.8em;
            opacity: 0.8;
        }

        .real-clock .time {
            color: #FF5E00;
            font-size: 1.4em;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .sidebar-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-direction: column;
        }

        .theme-toggle, .lang-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 10px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .theme-toggle:hover, .lang-toggle:hover {
            background: rgba(255, 94, 0, 0.6);
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 10px;
        }

        .nav-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 12px 15px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-size: 1em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover {
            background: var(--sidebar-hover);
            transform: translateX(5px);
        }

        .nav-btn.active {
            background: #FF5E00;
            color: white;
        }

        .events-sidebar {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid rgba(255, 94, 0, 0.3);
        }

        .events-sidebar h3 {
            color: white;
            font-size: 1.1em;
            margin-bottom: 15px;
            text-align: center;
        }

        .event-card {
            background: var(--event-card-bg);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            border-left: 4px solid var(--event-border);
            transition: all 0.3s;
            cursor: pointer;
        }

        .event-card.past {
            opacity: 0.8;
            border-left-color: #888;
        }

        .event-card:hover {
            transform: translateX(5px);
            background: var(--sidebar-hover);
        }

        .event-name {
            font-weight: bold;
            color: var(--text-primary);
            font-size: 0.9em;
        }

        .event-date {
            font-size: 0.7em;
            color: var(--text-secondary);
            margin: 5px 0;
        }

        .event-location {
            font-size: 0.7em;
            color: #FF5E00;
            font-weight: bold;
        }

        .event-status {
            font-size: 0.65em;
            margin-top: 5px;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .status-upcoming {
            background: #4CAF50;
            color: white;
        }

        .status-finished {
            background: #666;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--modal-bg);
            color: var(--modal-text);
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 25px;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #FF5E00;
        }

        .modal-header h2 {
            color: #FF5E00;
            font-size: 1.5em;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 2em;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .modal-close:hover {
            color: #FF5E00;
        }

        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            background: #FF5E00;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8em;
            margin-top: 10px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            color: var(--text-primary);
        }

        .card h2 {
            color: #FF5E00;
            margin-bottom: 20px;
            border-left: 4px solid #FF5E00;
            padding-left: 15px;
        }

        .pros-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .pro-card {
            background: var(--event-card-bg);
            border-radius: 15px;
            padding: 18px;
            transition: transform 0.3s;
            border-left: 4px solid #FF5E00;
        }

        .pro-card:hover {
            transform: translateY(-5px);
        }

        .pro-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #FF5E00;
            margin-bottom: 5px;
        }

        .pro-team {
            color: var(--text-secondary);
            font-size: 0.8em;
            margin-bottom: 12px;
        }

        .pro-settings {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            font-size: 0.8em;
        }

        .pro-setting {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            padding: 4px 0;
        }

        .setting-label {
            font-weight: bold;
            color: var(--text-secondary);
        }

        .setting-value {
            color: #FF5E00;
            font-weight: bold;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .setting-item {
            background: var(--event-card-bg);
            padding: 15px;
            border-radius: 15px;
            border-left: 4px solid #FF5E00;
        }

        .setting-name {
            font-weight: bold;
            color: #FF5E00;
            margin-bottom: 8px;
        }

        .setting-value {
            font-size: 1.2em;
            font-weight: bold;
            margin: 5px 0;
        }

        .setting-desc {
            font-size: 0.8em;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .controls-table {
            width: 100%;
            border-collapse: collapse;
        }

        .controls-table th,
        .controls-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .controls-table th {
            background: #FF5E00;
            color: white;
        }

        .key-badge {
            display: inline-block;
            background: #333;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85em;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                max-height: 50vh;
            }
            .main-content {
                margin-left: 0;
            }
            .app-wrapper {
                flex-direction: column;
            }
            .pros-grid {
                grid-template-columns: 1fr;
            }
            .settings-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 1.3em;
            }
        }
    </style>
</head>

    <div class="app-wrapper">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>⚡ Rocket League</h2>
                <p>Pro Settings & Events</p>
            </div>
            
            <div class="real-clock">
                <div class="date" id="realDate"></div>
                <div class="time" id="realTime"></div>
            </div>
            
            <div class="sidebar-controls">
                <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙 Modo Oscuro</button>
                <button class="lang-toggle" id="langBtn" onclick="toggleLanguage()">🇪🇸 Español</button>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item"><button class="nav-btn active" onclick="showTab('pros', this)">👑 Pro Players</button></li>
                <li class="nav-item"><button class="nav-btn" onclick="showTab('camara', this)">📷 Cámara</button></li>
                <li class="nav-item"><button class="nav-btn" onclick="showTab('controles', this)">🎮 Controles</button></li>
                <li class="nav-item"><button class="nav-btn" onclick="showTab('video', this)">🖥️ Video</button></li>
                <li class="nav-item"><button class="nav-btn" onclick="showTab('consejos', this)">💡 Consejos</button></li>

            <div class="events-sidebar">
                <h3 id="eventsTitle">📅 Próximos Eventos</h3>
                <div id="eventsList"></div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="header">

            <div id="pros" class="tab-content active">

            <div id="camara" class="tab-content">

                </div>
            </div>
            
            <div id="controles" class="tab-content">
                <div class="card">
                    <h2 id="controlsTitle">🎮 Controles</h2>
                    <table class="controls-table">
                        <thead><tr><th id="actionCol">Acción</th><th id="keyCol">Tecla</th><th id="whyCol">Por qué</th></tr></thead>
                        <tbody id="controlsBody"></tbody>
                    </table>
                </div>
            </div>
            
            <div id="video" class="tab-content">
                <div class="card">
                    <h2 id="videoTitle">🖥️ Video</h2>
                    <div class="settings-grid" id="videoSettings"></div>
                </div>
            </div>
            
            <div id="consejos" class="tab-content">

                    <h2 id="tipsTitle">💡 Consejos para mejorar</h2>
                    <div class="settings-grid" id="tipsGrid"></div>
                </div>
            </div>
        </div>
    </div>

            }
        };

        // ==================== VARIABLES GLOBALES ====================
        let currentLang = 'es';

        // ==================== FUNCIÓN PARA COMPARAR CON FECHA REAL ====================
        function isEventFinished(event) {
            const now = new Date();
            return now > event.dateEnd;
        }

        // ==================== MOSTRAR DETALLES DEL EVENTO ====================
        window.showEventDetails = function(eventJson) {
            const event = eventJson;
            const modal = document.getElementById('eventModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            const isFinished = isEventFinished(event);
            const statusText = isFinished ? (currentLang === 'es' ? '🏁 FINALIZADO' : '🏁 FINISHED') : (currentLang === 'es' ? '📅 PRÓXIMO' : '📅 UPCOMING');
            const winnerHtml = event.winner && isFinished ? `<p><strong>🏆 Ganador:</strong> ${event.winner} ${event.winnerScore ? `(${event.winnerScore})` : ''}</p>` : '';
            
            modalTitle.innerHTML = `🏆 ${event.name}`;
            modalBody.innerHTML = `
                <p><strong>📅 Fecha:</strong> ${event.date}</p>
                <p><strong>📍 Ubicación:</strong> ${event.location}</p>
                <p><strong>💰 Premio:</strong> ${event.prize}</p>
                <p><strong>✅ Verificado:</strong> ${event.verified ? (currentLang === 'es' ? 'Sí' : 'Yes') : (currentLang === 'es' ? 'Pendiente' : 'Pending')}</p>
                <p><strong>📖 Descripción:</strong> ${event.desc}</p>
                ${winnerHtml}
                <p><strong>📌 Estado:</strong> <span style="color: ${isFinished ? '#FF5E00' : '#4CAF50'}; font-weight: bold;">${statusText}</span></p>
            `;
            modal.classList.add('show');
        };

        window.closeModal = function() {
            document.getElementById('eventModal').classList.remove('show');
        };

        // ==================== CARGAR EVENTOS ====================
        function loadEvents() {
            const container = document.getElementById('eventsList');
            const events = eventsData[currentLang];
            container.innerHTML = '';
            events.forEach(event => {
                const isFinished = isEventFinished(event);
                const statusClass = isFinished ? 'status-finished' : 'status-upcoming';
                const statusText = isFinished ? (currentLang === 'es' ? '🏁 Finalizado' : '🏁 Finished') : (currentLang === 'es' ? '📅 Próximo' : '📅 Upcoming');
                
                container.innerHTML += `
                    <div class="event-card ${isFinished ? 'past' : ''}" onclick="showEventDetails(${JSON.stringify(event).replace(/"/g, '&quot;')})">
                        <div class="event-name">🏆 ${event.name}</div>
                        <div class="event-date">📅 ${event.date}</div>
                        <div class="event-location">📍 ${event.location}</div>
                        <div class="event-status ${statusClass}">${statusText}</div>
                        ${event.winner && isFinished ? `<div style="font-size:0.65em; color:#FF5E00; margin-top:5px;">🏆 Ganador: ${event.winner}</div>` : ''}
                    </div>
                `;
            });
        }

        // ==================== CARGAR PROS ====================
        function loadPros() {
            const grid = document.getElementById('prosGrid');
            const pros = prosData[currentLang];
            grid.innerHTML = '';
            pros.forEach(pro => {
                grid.innerHTML += `<div class="pro-card">
                    <div class="pro-name">${pro.name}</div>
                    <div class="pro-team">${pro.team}</div>
                    <div class="pro-settings">
                        <div class="pro-setting"><span class="setting-label">FOV:</span><span class="setting-value">${pro.settings.fov}</span></div>
                        <div class="pro-setting"><span class="setting-label">Dist:</span><span class="setting-value">${pro.settings.distance}</span></div>
                        <div class="pro-setting"><span class="setting-label">Alt:</span><span class="setting-value">${pro.settings.height}</span></div>
                        <div class="pro-setting"><span class="setting-label">Ang:</span><span class="setting-value">${pro.settings.angle}</span></div>
                        <div class="pro-setting"><span class="setting-label">Rigidez:</span><span class="setting-value">${pro.settings.stiffness}</span></div>
                        <div class="pro-setting"><span class="setting-label">Zona M:</span><span class="setting-value">${pro.settings.deadzone}</span></div>
                        <div class="pro-setting"><span class="setting-label">Sen Dir:</span><span class="setting-value">${pro.settings.sens_dir}</span></div>
                        <div class="pro-setting"><span class="setting-label">Sen Air:</span><span class="setting-value">${pro.settings.sens_air}</span></div>
                    </div>
                </div>`;
            });
        }

        // ==================== CARGAR CÁMARA ====================
        function loadCameraSettings() {
            const container = document.getElementById('cameraSettings');
            const settings = translationsData[currentLang].camera;
            container.innerHTML = '';
            settings.forEach(set => {
                container.innerHTML += `<div class="setting-item"><div class="setting-name">${set.name}</div><div class="setting-value">${set.value}</div><div class="setting-desc">${set.desc}</div></div>`;
            });
        }

        // ==================== CARGAR CONTROLES ====================
        function loadControls() {
            const body = document.getElementById('controlsBody');
            const controls = translationsData[currentLang].controls;
            body.innerHTML = '';
            controls.forEach(ctrl => {
                body.innerHTML += `<tr><td>${ctrl.action}</td><td><span class="key-badge">${ctrl.key}</span></td><td>${ctrl.why}</td></tr>`;
            });
        }

        // ==================== CARGAR VIDEO ====================
        function loadVideoSettings() {
            const container = document.getElementById('videoSettings');
            const settings = translationsData[currentLang].video;
            container.innerHTML = '';
            settings.forEach(set => {
                container.innerHTML += `<div class="setting-item"><div class="setting-name">${set.name}</div><div class="setting-value">${set.value}</div><div class="setting-desc">${set.desc}</div></div>`;
            });
        }

        // ==================== CARGAR CONSEJOS ====================
        function loadTips() {
            const container = document.getElementById('tipsGrid');
            const tips = translationsData[currentLang].tips;
            container.innerHTML = '';
            tips.forEach(tip => {
                container.innerHTML += `<div class="setting-item"><div class="setting-name">${tip.title}</div><div class="setting-desc">${tip.desc}</div></div>`;
            });
        }

        // ==================== ACTUALIZAR TEXTOS DE INTERFAZ ====================
        function updateUITexts() {
            document.getElementById('mainTitle').innerHTML = currentLang === 'es' ? '🏆 Rocket League Pro Settings' : '🏆 Rocket League Pro Settings';
            document.getElementById('mainDesc').innerHTML = currentLang === 'es' ? 'Configuración de pros y calendario oficial RLCS 2026' : 'Pro settings and official RLCS 2026 schedule';
            document.getElementById('badgeText').innerHTML = currentLang === 'es' ? '🔥 Datos oficiales' : '🔥 Official data';
            document.getElementById('prosTitle').innerHTML = currentLang === 'es' ? '👑 Configuración de Pros' : '👑 Pro Players Settings';
            document.getElementById('camTitle').innerHTML = currentLang === 'es' ? '📷 Configuración de Cámara' : '📷 Camera Settings';
            document.getElementById('controlsTitle').innerHTML = currentLang === 'es' ? '🎮 Controles' : '🎮 Controls';
            document.getElementById('videoTitle').innerHTML = currentLang === 'es' ? '🖥️ Video' : '🖥️ Video Settings';
            document.getElementById('tipsTitle').innerHTML = currentLang === 'es' ? '💡 Consejos para mejorar' : '💡 Improvement Tips';
            document.getElementById('actionCol').innerHTML = currentLang === 'es' ? 'Acción' : 'Action';
            document.getElementById('keyCol').innerHTML = currentLang === 'es' ? 'Tecla' : 'Key';
            document.getElementById('whyCol').innerHTML = currentLang === 'es' ? 'Por qué' : 'Why';
            document.getElementById('eventsTitle').innerHTML = currentLang === 'es' ? '📅 Próximos Eventos' : '📅 Upcoming Events';
            
            const themeBtn = document.getElementById('themeBtn');
            const isDark = document.body.classList.contains('dark');
            themeBtn.innerHTML = isDark ? (currentLang === 'es' ? '☀️ Modo Claro' : '☀️ Light Mode') : (currentLang === 'es' ? '🌙 Modo Oscuro' : '🌙 Dark Mode');
            
            const langBtn = document.getElementById('langBtn');
            langBtn.innerHTML = currentLang === 'es' ? '🇪🇸 Español' : '🇺🇸 English';
        }

        // ==================== CARGAR TODO ====================
        function loadAllContent() {
            updateUITexts();
            loadEvents();
            loadPros();
            loadCameraSettings();
            loadControls();
            loadVideoSettings();
            loadTips();
            updateRealClock();
        }

        // ==================== FUNCIONES GLOBALES ====================
        window.toggleLanguage = function() {
            currentLang = currentLang === 'es' ? 'en' : 'es';
            loadAllContent();
        };

        window.toggleTheme = function() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            const themeBtn = document.getElementById('themeBtn');
            themeBtn.innerHTML = isDark ? (currentLang === 'es' ? '☀️ Modo Claro' : '☀️ Light Mode') : (currentLang === 'es' ? '🌙 Modo Oscuro' : '🌙 Dark Mode');
        };

        window.showTab = function(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(btn) btn.classList.add('active');
        };

        // ==================== EVENT LISTENERS ====================
        document.getElementById('eventModal').addEventListener('click', function(e) {
            if(e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if(e.key === 'Escape') closeModal();
        });

        // ==================== INICIALIZAR ====================
        loadAllContent();
        setInterval(() => {
            loadEvents();
            updateRealClock();
        }, 60000);
    </script>
</body>
</html>
