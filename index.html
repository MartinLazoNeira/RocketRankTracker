<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket League - Simulador de Cajas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #004DE5 0%, #FF5E00 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        /* Estadísticas del jugador */
        .player-stats {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #004DE5;
        }

        .credits {
            color: #FF5E00;
        }

        /* Área de la caja */
        .crate-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .crate {
            width: 250px;
            height: 250px;
            margin: 0 auto 30px;
            cursor: pointer;
            transition: transform 0.3s;
            position: relative;
        }

        .crate:hover {
            transform: scale(1.05);
        }

        .crate:active {
            transform: scale(0.95);
        }

        .crate-image {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #8B4513, #A0522D);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .crate.shaking {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .open-btn {
            background: linear-gradient(135deg, #004DE5 0%, #FF5E00 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .open-btn:hover {
            transform: translateY(-2px);
        }

        .open-btn:active {
            transform: translateY(0);
        }

        .open-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Resultado de la apertura */
        .result-area {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .item-display {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .item-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .item-rarity {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 10px;
        }

        .rarity-comun { background: #808080; color: white; }
        .rarity-raro { background: #4CAF50; color: white; }
        .rarity-muy-raro { background: #2196F3; color: white; }
        .rarity-importado { background: #9C27B0; color: white; }
        .rarity-black-market { background: #FF5E00; color: white; }

        /* Inventario */
        .inventory {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .inventory h3 {
            color: #004DE5;
            margin-bottom: 15px;
            text-align: center;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .inventory-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            border-left: 4px solid;
        }

        .inventory-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .inventory-item-icon {
            font-size: 40px;
            margin-bottom: 5px;
        }

        .inventory-item-name {
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .inventory-item-rarity {
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
        }

        .btn-reset {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            font-weight: bold;
        }

        .btn-reset:hover {
            background: #c82333;
        }

        @media (max-width: 768px) {
            .crate {
                width: 180px;
                height: 180px;
            }
            
            .crate-image {
                font-size: 60px;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎁 Rocket League Crate Simulator</h1>
            <p>Abre cajas y consigue items legendarios</p>
        </div>

        <div class="player-stats">
            <div class="stat">
                <div class="stat-label">🎫 Cajas disponibles</div>
                <div class="stat-value" id="cratesCount">5</div>
            </div>
            <div class="stat">
                <div class="stat-label">💰 Créditos</div>
                <div class="stat-value credits" id="credits">1000</div>
            </div>
            <div class="stat">
                <div class="stat-label">📦 Cajas abiertas</div>
                <div class="stat-value" id="totalOpened">0</div>
            </div>
        </div>

        <div class="crate-area">
            <div class="crate" id="crate">
                <div class="crate-image" id="crateImage">
                    📦
                </div>
            </div>
            <button class="open-btn" id="openBtn">Abrir Caja (100 créditos)</button>
            <button class="open-btn" id="buyCrateBtn" style="margin-left: 10px; background: linear-gradient(135deg, #28a745, #20c997);">Comprar Caja (200 créditos)</button>
        </div>

        <div id="resultArea" class="result-area" style="display: none;">
            <div class="item-display" id="itemIcon">🏆</div>
            <div class="item-name" id="itemName">Item Legendario</div>
            <div class="item-rarity" id="itemRarity">Black Market</div>
        </div>

        <div class="inventory">
            <h3>🎒 Mi Inventario</h3>
            <div class="inventory-grid" id="inventoryGrid"></div>
            <button class="btn-reset" id="resetBtn">🔄 Reinventario</button>
        </div>
    </div>

    <script>
        // Lista de items del juego
        const items = {
            comun: [
                { name: "Calcomanía Común", icon: "🎨", rarity: "comun" },
                { name: "Ruedas Estándar", icon: "⚙️", rarity: "comun" },
                { name: "Estela Común", icon: "💨", rarity: "comun" },
                { name: "Explosión Común", icon: "💥", rarity: "comun" },
                { name: "Pintura Común", icon: "🎨", rarity: "comun" }
            ],
            raro: [
                { name: "Octane: Dragon", icon: "🐉", rarity: "raro" },
                { name: "Dominus: Suji", icon: "⚡", rarity: "raro" },
                { name: "Ruedas Draco", icon: "🐲", rarity: "raro" },
                { name: "Estela Luminous", icon: "✨", rarity: "raro" },
                { name: "Calcomanía MG-88", icon: "🔧", rarity: "raro" }
            ],
            muyRaro: [
                { name: "Octane: Kilowatt", icon: "⚡", rarity: "muy-raro" },
                { name: "Ruedas Cristiano", icon: "👟", rarity: "muy-raro" },
                { name: "Estela Friction", icon: "🔥", rarity: "muy-raro" },
                { name: "Explosión Poly Pop", icon: "🎆", rarity: "muy-raro" },
                { name: "Ruedas Infinium", icon: "♾️", rarity: "muy-raro" }
            ],
            importado: [
                { name: "Octane PINTADO", icon: "🚗", rarity: "importado" },
                { name: "Ruedas Zomba", icon: "🌀", rarity: "importado" },
                { name: "Explosión Atomizer", icon: "💣", rarity: "importado" },
                { name: "Goal Explosion Hellfire", icon: "👹", rarity: "importado" },
                { name: "Ruedas Wonderment", icon: "🎄", rarity: "importado" }
            ],
            blackMarket: [
                { name: "⭐ 20XX Black Market", icon: "🌌", rarity: "black-market" },
                { name: "⭐ Dissolver", icon: "💧", rarity: "black-market" },
                { name: "⭐ Fire God", icon: "🔥", rarity: "black-market" },
                { name: "⭐ Mainframe", icon: "💻", rarity: "black-market" },
                { name: "⭐ Trigon", icon: "🔺", rarity: "black-market" },
                { name: "⭐ Dueling Dragons", icon: "🐉", rarity: "black-market" },
                { name: "⭐ Tidal Stream", icon: "🌊", rarity: "black-market" },
                { name: "⭐ Interstellar", icon: "🌠", rarity: "black-market" }
            ]
        };

        // Sistema de probabilidades (como el juego real)
        const probabilities = {
            comun: 0.54,      // 54%
            raro: 0.24,       // 24%
            muyRaro: 0.16,    // 16%
            importado: 0.04,  // 4%
            blackMarket: 0.02 // 2%
        };

        // Estado del juego
        let gameState = {
            crates: 5,
            credits: 1000,
            totalOpened: 0,
            inventory: []
        };

        // Guardar en localStorage
        function saveGame() {
            localStorage.setItem('rocketCrateGame', JSON.stringify(gameState));
        }

        // Cargar partida guardada
        function loadGame() {
            const saved = localStorage.getItem('rocketCrateGame');
            if (saved) {
                gameState = JSON.parse(saved);
            }
            updateUI();
        }

        // Obtener item aleatorio según rareza
        function getRandomItem() {
            const random = Math.random();
            let accumulated = 0;
            let selectedRarity = null;
            
            for (const [rarity, prob] of Object.entries(probabilities)) {
                accumulated += prob;
                if (random <= accumulated) {
                    selectedRarity = rarity;
                    break;
                }
            }
            
            const itemsArray = items[selectedRarity];
            const randomItem = {...itemsArray[Math.floor(Math.random() * itemsArray.length)]};
            return randomItem;
        }

        // Animación de apertura
        async function openCrate() {
            if (gameState.crates <= 0 && gameState.credits >= 100) {
                // Usar créditos si no hay cajas
                gameState.credits -= 100;
                gameState.totalOpened++;
            } else if (gameState.crates > 0) {
                gameState.crates--;
                gameState.totalOpened++;
            } else {
                alert("❌ No tienes suficientes créditos ni cajas. Compra más cajas o reinicia el juego.");
                return;
            }
            
            // Animación de sacudida
            const crate = document.getElementById('crate');
            crate.classList.add('shaking');
            
            // Cambiar ícono durante la animación
            const crateImage = document.getElementById('crateImage');
            crateImage.style.background = "linear-gradient(135deg, #FFD700, #FFA500)";
            crateImage.innerHTML = "🎲";
            
            await new Promise(resolve => setTimeout(resolve, 500));
            
            crate.classList.remove('shaking');
            
            // Obtener item
            const item = getRandomItem();
            gameState.inventory.unshift(item);
            
            // Mostrar resultado
            const resultArea = document.getElementById('resultArea');
            const itemIcon = document.getElementById('itemIcon');
            const itemName = document.getElementById('itemName');
            const itemRarity = document.getElementById('itemRarity');
            
            itemIcon.innerHTML = item.icon;
            itemName.innerHTML = item.name;
            itemRarity.innerHTML = item.rarity.toUpperCase().replace('-', ' ');
            itemRarity.className = `item-rarity rarity-${item.rarity}`;
            
            resultArea.style.display = 'block';
            resultArea.style.animation = 'none';
            resultArea.offsetHeight;
            resultArea.style.animation = 'fadeIn 0.5s';
            
            crateImage.style.background = "linear-gradient(135deg, #8B4513, #A0522D)";
            crateImage.innerHTML = "📦";
            
            updateUI();
            saveGame();
            
            // Efecto de confeti para items raros
            if (item.rarity === 'black-market' || item.rarity === 'importado') {
                createConfetti();
            }
        }
        
        // Comprar caja
        function buyCrate() {
            if (gameState.credits >= 200) {
                gameState.credits -= 200;
                gameState.crates++;
                updateUI();
                saveGame();
                showNotification("✅ Has comprado una caja por 200 créditos!", "success");
            } else {
                showNotification("❌ No tienes suficientes créditos. Completa misiones para ganar créditos!", "error");
                // Dar créditos gratis si no tiene (bonus por no tener)
                if (gameState.credits < 200 && gameState.totalOpened > 5) {
                    showNotification("🎁 ¡Bonus! Has recibido 500 créditos por jugar", "success");
                    gameState.credits += 500;
                    updateUI();
                    saveGame();
                }
            }
        }
        
        // Mostrar notificación
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.style.position = 'fixed';
            notification.style.top = '20px';
            notification.style.right = '20px';
            notification.style.padding = '15px 20px';
            notification.style.borderRadius = '10px';
            notification.style.backgroundColor = type === 'success' ? '#28a745' : '#dc3545';
            notification.style.color = 'white';
            notification.style.zIndex = '1000';
            notification.style.animation = 'fadeIn 0.3s';
            notification.innerHTML = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 2000);
        }
        
        // Efecto confeti
        function createConfetti() {
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = '10px';
                confetti.style.height = '10px';
                confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                confetti.style.left = Math.random() * window.innerWidth + 'px';
                confetti.style.top = '-10px';
                confetti.style.borderRadius = '50%';
                confetti.style.pointerEvents = 'none';
                confetti.style.zIndex = '999';
                document.body.appendChild(confetti);
                
                const animation = confetti.animate([
                    { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
                    { transform: `translateY(${window.innerHeight + 10}px) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 2000 + 1000,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                });
                
                animation.onfinish = () => confetti.remove();
            }
        }
        
        // Reiniciar inventario
        function resetGame() {
            if (confirm("¿Seguro que quieres reiniciar tu inventario? Perderás todos tus items.")) {
                gameState = {
                    crates: 5,
                    credits: 1000,
                    totalOpened: 0,
                    inventory: []
                };
                updateUI();
                saveGame();
                showNotification("🔄 Juego reiniciado. ¡Suerte con las nuevas cajas!", "success");
            }
        }
        
        // Actualizar interfaz
        function updateUI() {
            document.getElementById('cratesCount').innerText = gameState.crates;
            document.getElementById('credits').innerText = gameState.credits;
            document.getElementById('totalOpened').innerText = gameState.totalOpened;
            
            // Actualizar inventario
            const inventoryGrid = document.getElementById('inventoryGrid');
            if (gameState.inventory.length === 0) {
                inventoryGrid.innerHTML = '<div style="text-align: center; color: #999; grid-column: 1/-1;">Abre cajas para ver tus items aquí 📦</div>';
            } else {
                inventoryGrid.innerHTML = gameState.inventory.map((item, index) => `
                    <div class="inventory-item" style="border-left-color: ${getRarityColor(item.rarity)}">
                        <div class="inventory-item-icon">${item.icon}</div>
                        <div class="inventory-item-name">${item.name}</div>
                        <div class="inventory-item-rarity rarity-${item.rarity}">${item.rarity}</div>
                    </div>
                `).join('');
            }
        }
        
        function getRarityColor(rarity) {
            const colors = {
                comun: '#808080',
                raro: '#4CAF50',
                'muy-raro': '#2196F3',
                importado: '#9C27B0',
                'black-market': '#FF5E00'
            };
            return colors[rarity] || '#666';
        }
        
        // Bonus diario de créditos
        function dailyBonus() {
            const lastBonus = localStorage.getItem('lastBonus');
            const today = new Date().toDateString();
            
            if (lastBonus !== today) {
                gameState.credits += 200;
                localStorage.setItem('lastBonus', today);
                updateUI();
                saveGame();
                showNotification("🎁 ¡Bonus diario! Has recibido 200 créditos", "success");
            }
        }
        
        // Event listeners
        document.getElementById('openBtn').addEventListener('click', openCrate);
        document.getElementById('buyCrateBtn').addEventListener('click', buyCrate);
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        
        // Inicializar
        loadGame();
        dailyBonus();
        
        // Instrucciones en consola
        console.log('🎮 Rocket League Crate Simulator cargado!');
        console.log('📦 Abre cajas y consigue items raros');
        console.log('🏆 Los items Black Market son los más difíciles de conseguir (2% de probabilidad)');
    </script>
</body>
</html>
