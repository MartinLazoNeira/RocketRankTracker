<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rocket League Pro Settings & Events</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-start: #004DE5;
            --bg-gradient-end: #FF5E00;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #333;
            --text-secondary: #666;
            --border-color: #e0e0e0;
            --sidebar-bg: rgba(0, 0, 0, 0.3);
            --sidebar-hover: rgba(255, 94, 0, 0.3);
            --event-card-bg: #f8f9fa;
            --event-border: #FF5E00;
            --modal-bg: white;
            --modal-text: #333;
        }

        body.dark {
            --bg-gradient-start: #001a4d;
            --bg-gradient-end: #4a1c00;
            --card-bg: rgba(30, 30, 40, 0.95);
            --text-primary: #e0e0e0;
            --text-secondary: #aaa;
            --border-color: #444;
            --sidebar-bg: rgba(0, 0, 0, 0.5);
            --event-card-bg: #2a2a3a;
            --modal-bg: #2a2a3a;
            --modal-text: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        .app-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            border-right: 2px solid rgba(255, 94, 0, 0.3);
            transition: all 0.3s;
            z-index: 10;
        }

        .sidebar-header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #FF5E00;
            margin-bottom: 20px;
        }

        .sidebar-header h2 {
            color: white;
            font-size: 1.3em;
        }

        .sidebar-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8em;
            margin-top: 5px;
        }

        .sidebar-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-direction: column;
        }

        .theme-toggle, .lang-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 10px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            width: 100%;
        }

        .theme-toggle:hover, .lang-toggle:hover {
            background: rgba(255, 94, 0, 0.6);
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 10px;
        }

        .nav-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 12px 15px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-size: 1em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover {
            background: var(--sidebar-hover);
            transform: translateX(5px);
        }

        .nav-btn.active {
            background: #FF5E00;
            color: white;
        }

        .events-sidebar {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid rgba(255, 94, 0, 0.3);
        }

        .events-sidebar h3 {
            color: white;
            font-size: 1.1em;
            margin-bottom: 15px;
            text-align: center;
        }

        .event-card {
            background: var(--event-card-bg);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            border-left: 4px solid var(--event-border);
            transition: all 0.3s;
            cursor: pointer;
        }

        .event-card:hover {
            transform: translateX(5px);
            background: var(--sidebar-hover);
        }

        .event-name {
            font-weight: bold;
            color: var(--text-primary);
            font-size: 0.9em;
        }

        .event-date {
            font-size: 0.7em;
            color: var(--text-secondary);
            margin: 5px 0;
        }

        .event-location {
            font-size: 0.7em;
            color: #FF5E00;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--modal-bg);
            color: var(--modal-text);
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 25px;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #FF5E00;
        }

        .modal-header h2 {
            color: #FF5E00;
            font-size: 1.5em;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 2em;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .modal-close:hover {
            color: #FF5E00;
        }

        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            background: #FF5E00;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8em;
            margin-top: 10px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            color: var(--text-primary);
        }

        .card h2 {
            color: #FF5E00;
            margin-bottom: 20px;
            border-left: 4px solid #FF5E00;
            padding-left: 15px;
        }

        .pros-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .pro-card {
            background: var(--event-card-bg);
            border-radius: 15px;
            padding: 18px;
            transition: transform 0.3s;
            border-left: 4px solid #FF5E00;
        }

        .pro-card:hover {
            transform: translateY(-5px);
        }

        .pro-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #FF5E00;
            margin-bottom: 5px;
        }

        .pro-team {
            color: var(--text-secondary);
            font-size: 0.8em;
            margin-bottom: 12px;
        }

        .pro-settings {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            font-size: 0.8em;
        }

        .pro-setting {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            padding: 4px 0;
        }

        .setting-label {
            font-weight: bold;
            color: var(--text-secondary);
        }

        .setting-value {
            color: #FF5E00;
            font-weight: bold;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .setting-item {
            background: var(--event-card-bg);
            padding: 15px;
            border-radius: 15px;
            border-left: 4px solid #FF5E00;
        }

        .setting-name {
            font-weight: bold;
            color: #FF5E00;
            margin-bottom: 8px;
        }

        .setting-value {
            font-size: 1.2em;
            font-weight: bold;
            margin: 5px 0;
        }

        .setting-desc {
            font-size: 0.8em;
            color: var(--text-secondary);
        }

        .controls-table {
            width: 100%;
            border-collapse: collapse;
        }

        .controls-table th,
        .controls-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .controls-table th {
            background: #FF5E00;
            color: white;
        }

        .key-badge {
            display: inline-block;
            background: #333;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85em;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                max-height: 50vh;
            }
            .main-content {
                margin-left: 0;
            }
            .app-wrapper {
                flex-direction: column;
            }
            .pros-grid {
                grid-template-columns: 1fr;
            }
            .settings-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>⚡ Rocket League</h2>
                <p>Pro Settings & Events</p>
            </div>
            
            <div class="sidebar-controls">
                <button class="theme-toggle" onclick="toggleTheme()">🌙 Modo Oscuro</button>
                <button class="lang-toggle" onclick="toggleLanguage()">🇺🇸 English</button>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item"><button class="nav-btn active" onclick="showTab('pros', this)">👑 Pro Players</button></li>
                <li class="nav-item"><button class="nav-btn" onclick="showTab('camara', this)">📷 Cámara</button></li>
                <li class="nav-item"><button class="nav-btn" onclick="showTab('controles', this)">🎮 Controles</button></li>
                <li class="nav-item"><button class="nav-btn" onclick="showTab('video', this)">🖥️ Video</button></li>
                <li class="nav-item"><button class="nav-btn" onclick="showTab('consejos', this)">💡 Consejos</button></li>
            </ul>
            
            <div class="events-sidebar">
                <h3>📅 Próximos Eventos</h3>
                <div id="eventsList"></div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1 id="mainTitle">🏆 Rocket League Pro Settings</h1>
                <p id="mainDesc">Configuración de pros y calendario oficial RLCS 2026</p>
                <div class="badge" id="badgeText">🔥 Datos oficiales</div>
            </div>
            
            <div id="pros" class="tab-content active">
                <div class="card">
                    <h2 id="prosTitle">👑 Configuración de Pros</h2>
                    <div class="pros-grid" id="prosGrid"></div>
                </div>
            </div>
            
            <div id="camara" class="tab-content">
                <div class="card">
                    <h2 id="camTitle">📷 Configuración de Cámara</h2>
                    <div class="settings-grid" id="cameraSettings"></div>
                </div>
            </div>
            
            <div id="controles" class="tab-content">
                <div class="card">
                    <h2 id="controlsTitle">🎮 Controles</h2>
                    <table class="controls-table" id="controlsTable">
                        <thead><tr><th id="actionCol">Acción</th><th id="keyCol">Tecla</th><th id="whyCol">Por qué</th></tr></thead>
                        <tbody id="controlsBody"></tbody>
                    </table>
                </div>
            </div>
            
            <div id="video" class="tab-content">
                <div class="card">
                    <h2 id="videoTitle">🖥️ Video</h2>
                    <div class="settings-grid" id="videoSettings"></div>
                </div>
            </div>
            
            <div id="consejos" class="tab-content">
                <div class="card">
                    <h2 id="tipsTitle">💡 Consejos</h2>
                    <div class="settings-grid" id="tipsGrid"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Evento</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        const eventsData = {
            es: [
                { name: "RLCS Major 1 - Boston", date: "19-22 Febrero 2026", location: "Boston, USA", prize: "$354,000", verified: true, desc: "Primer Major de la temporada 2026." },
                { name: "RLCS Major 2 - París", date: "20-24 Mayo 2026", location: "París, Francia", prize: "$354,000", verified: true, desc: "Segundo Major de la temporada." },
                { name: "RLCS World Championship", date: "15-20 Septiembre 2026", location: "TBD", prize: "$1,200,000", verified: true, desc: "El campeonato mundial." },
                { name: "Esports World Cup", date: "Julio-Agosto 2026", location: "Riad, Arabia Saudita", prize: "Por anunciar", verified: false, desc: "Rocket League confirmado." },
                { name: "FIFAe World Cup", date: "Diciembre 2026", location: "Riad, Arabia Saudita", prize: "Por anunciar", verified: true, desc: "Colaboración FIFA y Rocket League." }
            ],
            en: [
                { name: "RLCS Major 1 - Boston", date: "Feb 19-22, 2026", location: "Boston, USA", prize: "$354,000", verified: true, desc: "First Major of 2026 season." },
                { name: "RLCS Major 2 - Paris", date: "May 20-24, 2026", location: "Paris, France", prize: "$354,000", verified: true, desc: "Second Major of the season." },
                { name: "RLCS World Championship", date: "Sep 15-20, 2026", location: "TBD", prize: "$1,200,000", verified: true, desc: "World Championship." },
                { name: "Esports World Cup", date: "July-August 2026", location: "Riyadh, Saudi Arabia", prize: "TBA", verified: false, desc: "Rocket League confirmed." },
                { name: "FIFAe World Cup", date: "December 2026", location: "Riyadh, Saudi Arabia", prize: "TBA", verified: true, desc: "FIFA x Rocket League collab." }
            ]
        };

        const prosData = {
            es: [
                { name: "Zen", team: "Vitality", settings: { fov: 110, distance: 280, height: 100, angle: -3, stiffness: 0.4, deadzone: 0.05, sens_dir: 1.4, sens_air: 1.4 } },
                { name: "M0nkey M00n", team: "BDS", settings: { fov: 110, distance: 270, height: 90, angle: -4, stiffness: 0.45, deadzone: 0.1, sens_dir: 1.5, sens_air: 1.6 } },
                { name: "Vatira", team: "KC", settings: { fov: 109, distance: 270, height: 100, angle: -4, stiffness: 0.35, deadzone: 0.08, sens_dir: 1.3, sens_air: 1.3 } },
                { name: "Firstkiller", team: "G2", settings: { fov: 110, distance: 280, height: 100, angle: -3, stiffness: 0.5, deadzone: 0.05, sens_dir: 1.35, sens_air: 1.35 } },
                { name: "Beastmode", team: "G2", settings: { fov: 110, distance: 270, height: 90, angle: -5, stiffness: 0.45, deadzone: 0.1, sens_dir: 1.4, sens_air: 1.4 } },
                { name: "Daniel", team: "Shopify", settings: { fov: 110, distance: 270, height: 100, angle: -3, stiffness: 0.4, deadzone: 0.1, sens_dir: 1.3, sens_air: 1.4 } }
            ],
            en: [
                { name: "Zen", team: "Vitality", settings: { fov: 110, distance: 280, height: 100, angle: -3, stiffness: 0.4, deadzone: 0.05, sens_dir: 1.4, sens_air: 1.4 } },
                { name: "M0nkey M00n", team: "BDS", settings: { fov: 110, distance: 270, height: 90, angle: -4, stiffness: 0.45, deadzone: 0.1, sens_dir: 1.5, sens_air: 1.6 } },
                { name: "Vatira", team: "KC", settings: { fov: 109, distance: 270, height: 100, angle: -4, stiffness: 0.35, deadzone: 0.08, sens_dir: 1.3, sens_air: 1.3 } },
                { name: "Firstkiller", team: "G2", settings: { fov: 110, distance: 280, height: 100, angle: -3, stiffness: 0.5, deadzone: 0.05, sens_dir: 1.35, sens_air: 1.35 } },
                { name: "Beastmode", team: "G2", settings: { fov: 110, distance: 270, height: 90, angle: -5, stiffness: 0.45, deadzone: 0.1, sens_dir: 1.4, sens_air: 1.4 } },
                { name: "Daniel", team: "Shopify", settings: { fov: 110, distance: 270, height: 100, angle: -3, stiffness: 0.4, deadzone: 0.1, sens_dir: 1.3, sens_air: 1.4 } }
            ]
        };

        let currentLang = 'es';

        function showEventDetails(eventName, eventDate, eventLocation, eventPrize, eventVerified, eventDesc) {
            const modal = document.getElementById('eventModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            modalTitle.innerHTML = `🏆 ${eventName}`;
            modalBody.innerHTML = `
                <p><strong>📅 Fecha:</strong> ${eventDate}</p>
                <p><strong>📍 Ubicación:</strong> ${eventLocation}</p>
                <p><strong>💰 Premio:</strong> ${eventPrize}</p>
                <p><strong>✅ Verificado:</strong> ${eventVerified ? 'Sí' : 'Pendiente'}</p>
                <p><strong>📖 Descripción:</strong> ${eventDesc}</p>
            `;
            modal.classList.add('show');
        }

        function closeModal() {
            document.getElementById('eventModal').classList.remove('show');
        }

        function loadEvents() {
            const container = document.getElementById('eventsList');
            const events = eventsData[currentLang];
            container.innerHTML = '';
            events.forEach(event => {
                container.innerHTML += `
                    <div class="event-card" onclick="showEventDetails('${event.name}', '${event.date}', '${event.location}', '${event.prize}', ${event.verified}, '${event.desc}')">
                        <div class="event-name">🏆 ${event.name}</div>
                        <div class="event-date">📅 ${event.date}</div>
                        <div class="event-location">📍 ${event.location}</div>
                        ${event.verified ? '<div style="font-size:0.6em; color:#4CAF50;">✅ Verificado</div>' : '<div style="font-size:0.6em; color:#FF5E00;">⚠️ Por confirmar</div>'}
                    </div>
                `;
            });
        }

        function loadPros() {
            const grid = document.getElementById('prosGrid');
            const pros = prosData[currentLang];
            grid.innerHTML = '';
            pros.forEach(pro => {
                grid.innerHTML += `<div class="pro-card">
                    <div class="pro-name">${pro.name}</div>
                    <div class="pro-team">${pro.team}</div>
                    <div class="pro-settings">
                        <div class="pro-setting"><span class="setting-label">FOV:</span><span class="setting-value">${pro.settings.fov}</span></div>
                        <div class="pro-setting"><span class="setting-label">Dist:</span><span class="setting-value">${pro.settings.distance}</span></div>
                        <div class="pro-setting"><span class="setting-label">Alt:</span><span class="setting-value">${pro.settings.height}</span></div>
                        <div class="pro-setting"><span class="setting-label">Ang:</span><span class="setting-value">${pro.settings.angle}</span></div>
                        <div class="pro-setting"><span class="setting-label">Rigidez:</span><span class="setting-value">${pro.settings.stiffness}</span></div>
                        <div class="pro-setting"><span class="setting-label">Zona M:</span><span class="setting-value">${pro.settings.deadzone}</span></div>
                        <div class="pro-setting"><span class="setting-label">Sen Dir:</span><span class="setting-value">${pro.settings.sens_dir}</span></div>
                        <div class="pro-setting"><span class="setting-label">Sen Air:</span><span class="setting-value">${pro.settings.sens_air}</span></div>
                    </div>
                </div>`;
            });
        }

        function loadCameraSettings() {
            const container = document.getElementById('cameraSettings');
            const settings = currentLang === 'es' 
                ? [{name:"Campo de visión (FOV)",value:"110",desc:"Máximo permitido"},{name:"Distancia",value:"270-280",desc:"Balance campo/coche"},{name:"Altura",value:"90-110",desc:"Mejor visión"},{name:"Ángulo",value:"-3 a -5",desc:"Cámara más baja"},{name:"Rigidez",value:"0.35-0.50",desc:"Movimiento con velocidad"},{name:"Velocidad giro",value:"3.00-4.00",desc:"Qué tan rápido gira"}]
                : [{name:"Field of View",value:"110",desc:"Maximum allowed"},{name:"Distance",value:"270-280",desc:"Balance view/car"},{name:"Height",value:"90-110",desc:"Better vision"},{name:"Angle",value:"-3 to -5",desc:"Lower camera"},{name:"Stiffness",value:"0.35-0.50",desc:"Camera movement"},{name:"Swivel Speed",value:"3.00-4.00",desc:"Turn speed"}];
            container.innerHTML = '';
            settings.forEach(set => {
                container.innerHTML += `<div class="setting-item"><div class="setting-name">${set.name}</div><div class="setting-value">${set.value}</div><div class="setting-desc">${set.desc}</div></div>`;
            });
        }

        function loadControls() {
            const body = document.getElementById('controlsBody');
            const controls = currentLang === 'es'
                ? [{action:"Acelerar",key:"R2/RT",why:"Respuesta proporcional"},{action:"Frenar",key:"L2/LT",why:"Control progresivo"},{action:"Saltar",key:"X/A",why:"Acceso rápido"},{action:"Boost",key:"R1/RB",why:"Saltar y boostear"},{action:"Derrape",key:"Square/X",why:"Estándar"},{action:"Air Roll Izq",key:"L1/LB",why:"Rotación izquierda"},{action:"Air Roll Der",key:"R1/RB",why:"Rotación derecha"}]
                : [{action:"Accelerate",key:"R2/RT",why:"Proportional"},{action:"Brake",key:"L2/LT",why:"Progressive"},{action:"Jump",key:"X/A",why:"Quick access"},{action:"Boost",key:"R1/RB",why:"Jump+Boost"},{action:"Drift",key:"Square/X",why:"Standard"},{action:"Air Roll L",key:"L1/LB",why:"Left roll"},{action:"Air Roll R",key:"R1/RB",why:"Right roll"}];
            body.innerHTML = '';
            controls.forEach(ctrl => {
                body.innerHTML += `<tr><td>${ctrl.action}</td><td><span class="key-badge">${ctrl.key}</span></td><td>${ctrl.why}</td></tr>`;
            });
        }

        function loadVideoSettings() {
            const container = document.getElementById('videoSettings');
            const settings = currentLang === 'es'
                ? [{name:"Resolución",value:"1920x1080",desc:"Nativa"},{name:"Texturas",value:"Alta",desc:"Balance"},{name:"Sombras",value:"Bajas",desc:"Mejora FPS"},{name:"Desenfoque",value:"Apagado",desc:"Reduce input lag"},{name:"V-Sync",value:"Apagado",desc:"Reduce input lag"},{name:"FPS Límite",value:"250",desc:"Según monitor"}]
                : [{name:"Resolution",value:"1920x1080",desc:"Native"},{name:"Textures",value:"High",desc:"Balance"},{name:"Shadows",value:"Low",desc:"Better FPS"},{name:"Motion Blur",value:"Off",desc:"Reduce input lag"},{name:"V-Sync",value:"Off",desc:"Reduce input lag"},{name:"FPS Limit",value:"250",desc:"Match monitor"}];
            container.innerHTML = '';
            settings.forEach(set => {
                container.innerHTML += `<div class="setting-item"><div class="setting-name">${set.name}</div><div class="setting-value">${set.value}</div><div class="setting-desc">${set.desc}</div></div>`;
            });
        }

        function loadTips() {
            const container = document.getElementById('tipsGrid');
            const tips = currentLang === 'es'
                ? [{title:"🎯 Calentamiento",desc:"15 min Free Play"},{title:"⚙️ Rotaciones",desc:"Rota al palo lejano"},{title:"💪 Posicionamiento",desc:"Entre balón y portería"},{title:"🔋 Boost",desc:"Recoge pads de 12"},{title:"🎮 Mecánicas",desc:"Half-flip, Wave dash"},{title:"📺 Repeticiones",desc:"Analiza errores"}]
                : [{title:"🎯 Warmup",desc:"15 min Free Play"},{title:"⚙️ Rotations",desc:"Rotate far post"},{title:"💪 Positioning",desc:"Ball to goal"},{title:"🔋 Boost",desc:"Collect 12 pads"},{title:"🎮 Mechanics",desc:"Half-flip, Wave dash"},{title:"📺 Replays",desc:"Analyze mistakes"}];
            container.innerHTML = '';
            tips.forEach(tip => {
                container.innerHTML += `<div class="setting-item"><div class="setting-name">${tip.title}</div><div class="setting-desc">${tip.desc}</div></div>`;
            });
        }

        function loadAllContent() {
            document.getElementById('mainTitle').innerHTML = currentLang === 'es' ? '🏆 Rocket League Pro Settings' : '🏆 Rocket League Pro Settings';
            document.getElementById('mainDesc').innerHTML = currentLang === 'es' ? 'Configuración de pros y calendario oficial RLCS 2026' : 'Pro settings and official RLCS 2026 schedule';
            document.getElementById('badgeText').innerHTML = currentLang === 'es' ? '🔥 Datos oficiales' : '🔥 Official data';
            document.getElementById('prosTitle').innerHTML = currentLang === 'es' ? '👑 Configuración de Pros' : '👑 Pro Players Settings';
            document.getElementById('camTitle').innerHTML = currentLang === 'es' ? '📷 Configuración de Cámara' : '📷 Camera Settings';
            document.getElementById('controlsTitle').innerHTML = currentLang === 'es' ? '🎮 Controles' : '🎮 Controls';
            document.getElementById('videoTitle').innerHTML = currentLang === 'es' ? '🖥️ Video' : '🖥️ Video';
            document.getElementById('tipsTitle').innerHTML = currentLang === 'es' ? '💡 Consejos' : '💡 Tips';
            document.getElementById('actionCol').innerHTML = currentLang === 'es' ? 'Acción' : 'Action';
            document.getElementById('keyCol').innerHTML = currentLang === 'es' ? 'Tecla' : 'Key';
            document.getElementById('whyCol').innerHTML = currentLang === 'es' ? 'Por qué' : 'Why';
            
            loadEvents();
            loadPros();
            loadCameraSettings();
            loadControls();
            loadVideoSettings();
            loadTips();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'es' ? 'en' : 'es';
            document.querySelector('.lang-toggle').innerHTML = currentLang === 'es' ? '🇺🇸 English' : '🇪🇸 Español';
            loadAllContent();
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            document.querySelector('.theme-toggle').innerHTML = document.body.classList.contains('dark') ? '☀️ Modo Claro' : '🌙 Modo Oscuro';
        }

        function showTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(btn) btn.classList.add('active');
        }

        document.getElementById('eventModal').addEventListener('click', function(e) {
            if(e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if(e.key === 'Escape') closeModal();
        });

        loadAllContent();
    </script>
</body>
</html>
