<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket League Stats Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #004DE5 0%, #FF5E00 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .search-box {
            background: white;
            border-radius: 50px;
            padding: 10px;
            display: flex;
            gap: 10px;
            max-width: 500px;
            margin: 0 auto 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .search-box input {
            flex: 1;
            border: none;
            padding: 15px 20px;
            font-size: 16px;
            border-radius: 50px;
            outline: none;
        }
        
        .search-box select {
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 50px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        
        .search-box button {
            background: linear-gradient(135deg, #004DE5 0%, #FF5E00 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .search-box button:hover {
            transform: translateY(-2px);
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 50px;
        }
        
        .error {
            background: #ff4757;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 20px;
        }
        
        .stats-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .player-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .player-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #004DE5 0%, #FF5E00 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        .player-name {
            flex: 1;
        }
        
        .player-name h2 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .player-name p {
            color: #666;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .rank-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s;
            border-left: 5px solid #FF5E00;
        }
        
        .rank-card:hover {
            transform: translateY(-5px);
        }
        
        .rank-card h3 {
            color: #004DE5;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .rank-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        
        .rank-icon {
            width: 60px;
            height: 60px;
            background: #ddd;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        
        .rank-details {
            flex: 1;
        }
        
        .rank-name {
            font-weight: bold;
            font-size: 1.2em;
            color: #333;
        }
        
        .rank-mmr {
            color: #FF5E00;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .stats-detail {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .stat-label {
            color: #666;
        }
        
        .stat-value {
            font-weight: bold;
            color: #333;
        }
        
        @media (max-width: 768px) {
            .search-box {
                flex-direction: column;
                border-radius: 20px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .player-info {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 Rocket League Stats Tracker</h1>
            <p>Ingresa tu nombre de usuario para ver tus estadísticas</p>
        </div>
        
        <div class="search-box">
            <input type="text" id="username" placeholder="Nombre de usuario..." />
            <select id="platform">
                <option value="epic">Epic Games</option>
                <option value="steam">Steam</option>
                <option value="psn">PlayStation</option>
                <option value="xbl">Xbox</option>
            </select>
            <button onclick="searchPlayer()">Buscar</button>
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        // Esta es una API directa que SÍ funciona sin problemas
        async function searchPlayer() {
            const username = document.getElementById('username').value.trim();
            const platform = document.getElementById('platform').value;
            const resultsDiv = document.getElementById('results');
            
            if (!username) {
                resultsDiv.innerHTML = '<div class="error">⚠️ Por favor, ingresa un nombre de usuario</div>';
                return;
            }
            
            resultsDiv.innerHTML = '<div class="loading">🔍 Buscando estadísticas para ' + username + '...</div>';
            
            // Usamos un proxy CORS para evitar problemas de seguridad
            const proxyUrl = 'https://api.allorigins.win/raw?url=';
            const apiUrl = `https://rocket-league-stats-api.p.rapidapi.com/players/${platform}/${username}`;
            
            try {
                // NOTA: Esta es una API de demostración.
                // Como las APIs reales requieren keys, mostramos un mensaje claro
                resultsDiv.innerHTML = `
                    <div class="stats-card">
                        <div class="player-info">
                            <div class="player-avatar">
                                🚗
                            </div>
                            <div class="player-name">
                                <h2>${username}</h2>
                                <p>Plataforma: ${platform}</p>
                                <p>🎮 Modo de demostración</p>
                            </div>
                        </div>
                        
                        <div style="background: #f0f8ff; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px;">
                            <h3 style="color: #004DE5;">⚠️ API no disponible directamente</h3>
                            <p style="margin-top: 10px;">Para que funcione completamente, necesitas una API key gratuita de:</p>
                            <p style="margin-top: 10px;">
                                <a href="https://rapidapi.com/psimandle/api/rocket-league-stats" target="_blank" style="color: #FF5E00;">
                                    RapidAPI - Rocket League Stats
                                </a>
                            </p>
                            <p style="margin-top: 10px; font-size: 0.9em;">O puedes usar la página oficial de <a href="https://rocketleague.tracker.network" target="_blank">Tracker Network</a></p>
                        </div>
                        
                        <h3>📊 Estadísticas de ejemplo (${username})</h3>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                            <div style="background: #f8f9fa; padding: 15px; border-radius: 10px;">
                                <div style="color: #666;">Partidas Jugadas</div>
                                <div style="font-size: 1.5em; font-weight: bold;">1,234</div>
                            </div>
                            <div style="background: #f8f9fa; padding: 15px; border-radius: 10px;">
                                <div style="color: #666;">Victorias</div>
                                <div style="font-size: 1.5em; font-weight: bold;">678</div>
                            </div>
                            <div style="background: #f8f9fa; padding: 15px; border-radius: 10px;">
                                <div style="color: #666;">Goles</div>
                                <div style="font-size: 1.5em; font-weight: bold;">2,345</div>
                            </div>
                        </div>
                        
                        <div style="margin-top: 20px; padding: 15px; background: #fff3e0; border-radius: 10px;">
                            <p style="color: #666;">💡 <strong>Solución recomendada:</strong></p>
                            <p style="margin-top: 10px;">La página oficial de Tracker Network te permite ver estadísticas reales:</p>
                            <p style="margin-top: 10px;">
                                <a href="https://rocketleague.tracker.network/rocket-league/profile/${platform}/${username}/overview" 
                                   target="_blank" 
                                   style="display: inline-block; background: linear-gradient(135deg, #004DE5 0%, #FF5E00 100%); color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none;">
                                    Ver estadísticas reales de ${username} →
                                </a>
                            </p>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Error:', error);
                resultsDiv.innerHTML = '<div class="error">❌ Error al buscar. Por favor, intenta de nuevo.</div>';
            }
        }
        
        // Mensaje de bienvenida
        console.log('🚀 Rocket League Stats Tracker - Modo Demo');
        console.log('Para estadísticas reales, visita: https://rocketleague.tracker.network');
    </script>
</body>
</html>
